[build]
builder = "NIXPACKS"
buildCommand = "pnpm install --frozen-lockfile && pnpm run build --filter dashboard"
watchPatterns = ["apps/dashboard/**", "packages/**", "tsconfig.base.json"]

[deploy]
startCommand = "pnpm --filter dashboard start"
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3
