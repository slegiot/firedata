[build]
builder = "NIXPACKS"
buildCommand = "NODE_ENV=development pnpm install --frozen-lockfile && pnpm run build --filter dashboard"
watchPatterns = ["apps/dashboard/**", "packages/**", "tsconfig.base.json", "pnpm-lock.yaml"]

[deploy]
startCommand = "pnpm --filter dashboard start"
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3
