[build]
builder = "NIXPACKS"
buildCommand = "pnpm install --frozen-lockfile"
watchPatterns = ["packages/**", "services/news-service/**", "tsconfig.base.json"]

[deploy]
startCommand = "npx tsx services/news-service/src/server.ts"
healthcheckPath = "/health"
healthcheckTimeout = 60
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3
