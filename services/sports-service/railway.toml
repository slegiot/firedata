[build]
builder = "NIXPACKS"
buildCommand = "pnpm turbo build --filter=@firedata/sports-service..."
watchPatterns = ["packages/**", "services/sports-service/**", "tsconfig.base.json"]

[deploy]
startCommand = "node services/sports-service/dist/server.js"
healthcheckPath = "/health"
healthcheckTimeout = 60
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3
