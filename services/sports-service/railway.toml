[build]
builder = "NIXPACKS"
buildCommand = "pnpm install --frozen-lockfile && npx turbo build --filter=@firedata/sports-service..."
watchPatterns = ["packages/**", "services/sports-service/**", "tsconfig.base.json"]

[deploy]
startCommand = "npx tsx services/sports-service/src/server.ts"
healthcheckPath = "/health"
healthcheckTimeout = 60
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3
