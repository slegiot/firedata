[build]
builder = "DOCKERFILE"
dockerfilePath = "services/finance-service/Dockerfile"
watchPatterns = ["packages/**", "services/finance-service/**", "tsconfig.base.json", "pnpm-lock.yaml"]

[deploy]
healthcheckPath = "/health"
healthcheckTimeout = 60
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3
