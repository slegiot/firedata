[build]
builder = "NIXPACKS"
buildCommand = "pnpm install --frozen-lockfile && npx turbo build --filter=@firedata/finance-service..."
watchPatterns = ["packages/**", "services/finance-service/**", "tsconfig.base.json"]

[deploy]
startCommand = "npx tsx services/finance-service/src/server.ts"
healthcheckPath = "/health"
healthcheckTimeout = 60
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3
