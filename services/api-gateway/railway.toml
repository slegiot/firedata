[build]
builder = "NIXPACKS"
buildCommand = "pnpm install --frozen-lockfile && npx turbo build --filter=@firedata/api-gateway..."
watchPatterns = ["packages/**", "services/api-gateway/**", "tsconfig.base.json"]

[deploy]
startCommand = "npx tsx services/api-gateway/src/server.ts"
healthcheckPath = "/health"
healthcheckTimeout = 60
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3
