[build]
builder = "NIXPACKS"
buildCommand = "pnpm turbo build --filter=@firedata/api-gateway..."
watchPatterns = ["packages/**", "services/api-gateway/**", "tsconfig.base.json"]

[deploy]
startCommand = "node services/api-gateway/dist/server.js"
healthcheckPath = "/health"
healthcheckTimeout = 30
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3
